version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: geosmartmap-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: geosmartmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: geosmartmap-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@geosmartmap.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: always

volumes:
  pgdata:
